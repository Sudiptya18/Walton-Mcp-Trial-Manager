# XAMPP Apache — WALTON MCP only (does not touch hris / dms / shipment vhosts)
# Include this file from httpd-vhosts.conf, e.g.:
#   Include "C:/xampp/htdocs/walton-mcp-trial-manager/local/apache/waltonmcp.localhost.conf"
#
# Requires in httpd.conf (uncomment if needed):
#   LoadModule proxy_module modules/mod_proxy.so
#   LoadModule proxy_http_module modules/mod_proxy_http.so

<VirtualHost *:80>
    ServerName waltonmcp.localhost

    DocumentRoot "C:/xampp/htdocs/walton-mcp-trial-manager/client/dist"
    <Directory "C:/xampp/htdocs/walton-mcp-trial-manager/client/dist">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # API — dedicated port 5080 (WALTON only)
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:5080/api
    ProxyPassReverse /api http://127.0.0.1:5080/api

    ErrorLog "logs/waltonmcp.localhost-error.log"
    CustomLog "logs/waltonmcp.localhost-access.log" common
</VirtualHost>
